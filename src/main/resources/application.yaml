spring:
  application:
    name: multi-agent-recommendation-system
  profiles:
    active: mock

server:
  port: 8081

logging:
  level:
    root: INFO
    org.ct.multiagentrecommendationsystem: INFO
    org.ct.multiagentrecommendationsystem.controller: INFO
    org.ct.multiagentrecommendationsystem.orchestrator: INFO
    org.ct.multiagentrecommendationsystem.agent: INFO
    org.ct.multiagentrecommendationsystem.config: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# Agent 线程池配置
agent:
  thread-pool:
    core-size: 6
    max-size: 6
  timeout:
    default-seconds: 10
  retry:
    max-retries: 3
    initial-backoff-ms: 500

# A/B 实验配置
ab-test:
  experiment-id: rec_strategy
  control-weight: 50
  treatment-llm-weight: 50

# 向量检索配置
vector:
  top-k: 20

# Chat + Embedding API 配置（openai profile 时启用）
# 真实 API Key 请配置在 application-local.yaml（已 .gitignore）
---
spring:
  config:
    activate:
      on-profile: openai
  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      chat:
        options:
          model: deepseek-chat
          temperature: 0.7
      embedding:
        api-key: ${ZHIPU_API_KEY:}
        base-url: ${ZHIPU_BASE_URL:https://open.bigmodel.cn/api/paas/v4}
        path: ${ZHIPU_EMBEDDING_PATH:/embeddings}
        options:
          model: embedding-2
